<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog NelsNovel</title>
<style>
  :root{
    --bg: #1c1c22;
    --card-bg: #26262e;
    --accent: #f2994a;
    --text-light: #f5f5f5;
    --text-muted: #a0a0aa;
    --price-old: #6b6b75;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-light);
    min-height: 100vh;
  }

  .container{
    max-width: 900px;
    margin: 0 auto;
    padding-bottom: 60px;
  }

  /* BANNER */
  .banner{
    position: relative;
    width: 100%;
    aspect-ratio: 2/1;
    overflow: hidden;
    border-radius: 0 0 20px 20px;
  }
  .banner img{
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* PROFILE */
  .profile{
    position: relative;
    z-index: 1;
    text-align: center;
    margin-top: -55px;
    padding: 0 16px;
  }
  .profile .avatar{
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid var(--bg);
    overflow: hidden;
    margin: 0 auto 14px;
    background: var(--card-bg);
  }
  .profile .avatar img{
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .profile .username{
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 6px;
  }
  .profile .tagline{
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
  }

  /* GRID */
  .grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 28px 16px 0;
  }
  .card{
    background: var(--card-bg);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 2px solid var(--card-stroke, #4fd1c5);
    box-shadow: 0 6px 0 0 var(--card-stroke, #4fd1c5);
  }
  .card .cover{
    width: 100%;
    aspect-ratio: 3/4;
    overflow: hidden;
  }
  .card .cover img{
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card .info{
    padding: 10px;
  }
  .card .title{
    font-size: 12px;
    font-weight: 600;
    line-height: 1.4;
  }

  @media (max-width: 780px){
    .grid{
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
  }

  @media (max-width: 560px){
    .grid{
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
  }

  @media (max-width: 360px){
    .grid{
      grid-template-columns: repeat(1, 1fr);
    }
  }

  /* PAGINATION */
  .pagination{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 28px 16px 0;
    flex-wrap: wrap;
  }
  .page-btn{
    background: #ffffff;
    color: #000000;
    border: 2px solid #edb8ff;
    box-shadow: 0 4px 0 0 #edb8ff;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .page-btn:hover{
    filter: brightness(0.97);
  }
  .page-btn:disabled{
    opacity: 0.4;
    cursor: not-allowed;
  }
  .page-btn.active{
    background: #edb8ff;
  }
  .page-info{
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    padding: 0 6px;
  }
</style>
</head>
<body>

  <div class="container">

    <!-- BANNER -->
    <div class="banner">
      <img src="images/banner.png" alt="Banner toko">
    </div>

    <!-- PROFILE -->
    <div class="profile">
      <div class="avatar">
        <img src="images/foto-profil.jpg" alt="Foto profil toko">
      </div>
      <div class="username">@nelsnovel</div>
      <div class="tagline">Katalog Light Novel</div>
    </div>

    <!-- PRODUCT GRID (otomatis digenerate dari daftar "produk" di bawah) -->
    <div class="grid" id="productGrid"></div>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>

  </div>

  <script>
    // =====================================================
    // DAFTAR PRODUK — tinggal tambah baris baru di sini
    // kalau ada judul baru, tidak perlu sentuh bagian lain
    // =====================================================
    const produk = [
      { gambar: "images/cover1.jpg",   judul: "Bad End Fukahi no Make Heroine-tachi ga Mob Boukansha no Ore ni Renai Flag wo Tatete kuru", warna: "#4fd1c5" },
      { gambar: "images/produk-2.jpg", judul: "Judul Produk 2 yang Cukup Panjang di Sini", warna: "#f6ad55" },
      { gambar: "images/produk-3.jpg", judul: "Judul Produk 3 yang Cukup Panjang di Sini", warna: "#f56565" },
      { gambar: "images/produk-4.jpg", judul: "Judul Produk 4 yang Cukup Panjang di Sini", warna: "#63b3ed" },
      { gambar: "images/produk-5.jpg", judul: "Judul Produk 5 yang Cukup Panjang di Sini", warna: "#9f7aea" },
      { gambar: "images/produk-6.jpg", judul: "Judul Produk 6 yang Cukup Panjang di Sini", warna: "#48bb78" },
      { gambar: "images/produk-7.jpg", judul: "Judul Produk 7 yang Cukup Panjang di Sini", warna: "#ed64a6" },
      { gambar: "images/produk-8.jpg", judul: "Judul Produk 8 yang Cukup Panjang di Sini", warna: "#ecc94b" },
      { gambar: "images/cover1.jpg",   judul: "Bad End Fukahi no Make Heroine-tachi ga Mob Boukansha no Ore ni Renai Flag wo Tatete kuru", warna: "#4fd1c5" },
      { gambar: "images/produk-2.jpg", judul: "Judul Produk 2 yang Cukup Panjang di Sini", warna: "#f6ad55" },
      { gambar: "images/produk-3.jpg", judul: "Judul Produk 3 yang Cukup Panjang di Sini", warna: "#f56565" },
      { gambar: "images/produk-4.jpg", judul: "Judul Produk 4 yang Cukup Panjang di Sini", warna: "#63b3ed" },
    ];

    // =====================================================
    // PENGATURAN PAGINATION
    // =====================================================
    const PRODUK_PER_HALAMAN = 25;
    let halamanAktif = 1;

    const grid = document.getElementById("productGrid");
    const pagination = document.getElementById("pagination");
    const totalHalaman = Math.ceil(produk.length / PRODUK_PER_HALAMAN);

    function renderGrid(halaman) {
      grid.innerHTML = "";

      const mulai = (halaman - 1) * PRODUK_PER_HALAMAN;
      const akhir = mulai + PRODUK_PER_HALAMAN;
      const produkHalamanIni = produk.slice(mulai, akhir);

      produkHalamanIni.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.style.setProperty("--card-stroke", item.warna || "#4fd1c5");

        card.innerHTML = `
          <div class="cover">
            <img src="${item.gambar}" alt="${item.judul}" loading="lazy">
          </div>
          <div class="info">
            <div class="title">${item.judul}</div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function renderPagination(halaman) {
      pagination.innerHTML = "";

      // Tombol "Sebelumnya"
      const btnPrev = document.createElement("button");
      btnPrev.className = "page-btn";
      btnPrev.textContent = "← Sebelumnya";
      btnPrev.disabled = halaman === 1;
      btnPrev.onclick = () => gotoHalaman(halaman - 1);
      pagination.appendChild(btnPrev);

      // Info halaman
      const info = document.createElement("span");
      info.className = "page-info";
      info.textContent = `Halaman ${halaman} dari ${totalHalaman}`;
      pagination.appendChild(info);

      // Tombol "Selanjutnya"
      const btnNext = document.createElement("button");
      btnNext.className = "page-btn";
      btnNext.textContent = "Selanjutnya →";
      btnNext.disabled = halaman === totalHalaman;
      btnNext.onclick = () => gotoHalaman(halaman + 1);
      pagination.appendChild(btnNext);
    }

    function gotoHalaman(halaman) {
      if (halaman < 1 || halaman > totalHalaman) return;
      halamanAktif = halaman;
      renderGrid(halamanAktif);
      renderPagination(halamanAktif);
      grid.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    // Render pertama kali saat halaman dibuka
    renderGrid(halamanAktif);
    renderPagination(halamanAktif);
  </script>

</body>
</html>
